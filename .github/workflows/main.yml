name: CI-Docker-Check
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t trabalho-puc .

      - name: Run Unit Tests
        run: |
          # Executa os 5 testes unitários oficiais dentro do container
          docker run trabalho-puc python3 test_hospital.py

      # --- SEÇÃO DE TESTES E EXPERIÊNCIA ---
      
      # - name: Test Docker Container (Comando Antigo - Causava Timeout)
      #   run: docker run trabalho-puc

      - name: Test Security and Data Generation
        run: |
          # Valida integridade e segurança sem travar o Workflow
          docker run trabalho-puc python3 validador_seguranca.py
          docker run trabalho-puc python3 gerador_massa_dados.py
          echo "✅ Validação de segurança e geração de massa concluídas com sucesso!"

      - name: Final Audit Check
        run: |
          # Garante que a auditoria inicial (main.py) funcionou
          docker run trabalho-puc python3 main.py

      # --- SEMANA 6: MONITORAMENTO E ALERTAS ---
      - name: Send Deployment Status Alert
        if: always()
        run: |
          echo "SISTEMA DE ALERTA: Finalizando pipeline de CI/CD."
          echo "Status do Job: ${{ job.status }}"
          echo "Notificação enviada para o administrador do sistema hospitalar."
